# product-service.yml — spring.application.name=product-service 인 서비스에게만 배달된다.
server:
  port: 8081

spring:
  # 서비스마다 자기만의 DB를 갖는다 (Database per Service)
  datasource:
    url: jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 재시작 없이 바꾸는 데모용 배너 문구 (BannerController 의 @Value 로 주입)
product:
  banner:
    message: "그로우마이티 여름 세일 — 전 상품 20% 할인!"
