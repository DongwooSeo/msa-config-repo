# application.yml — "모든" Config Client 에게 공통으로 배달된다.
# 파일 이름이 application.yml 이면 spring.application.name 과 무관하게 전원 공통.

eureka:
  client:
    service-url:
      # 9곳에 복붙돼 있던 Eureka 주소가 이 세상 단 한 곳으로 모였다.
      defaultZone: http://localhost:8761/eureka
    refresh:
      # Eureka 클라이언트를 refresh 대상에서 제외 — 필수!
      # (POST /actuator/refresh 시 Eureka 클라이언트 재생성이 NPE 로 터지는 것을 막는다)
      enable: false

# 모든 서비스가 /actuator/refresh 로 무중단 설정 갱신을 쓸 수 있게 공통 노출.
management:
  endpoints:
    web:
      exposure:
        include: refresh
  endpoint:
    refresh:
      access: unrestricted
