# order-service.yml — spring.application.name=order-service 인 서비스에게만 배달된다.
server:
  port: 8080
  tomcat:
    threads:
      max: 5

spring:
  # 서비스마다 자기만의 DB를 갖는다 (Database per Service)
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# "base-url 만 바꾸면 MSA" 의 실체 — 배포 환경에선 이 값만 바꾼다.
order:
  client:
    product-base-url: http://product-service
    payment-base-url: http://payment-service
